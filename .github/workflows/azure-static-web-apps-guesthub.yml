name: Deploy GuestHub to Azure Static Web Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  VITE_API_URL: https://laravel-datalayer-aea9gdd6ghfrhkhw.italynorth-01.azurewebsites.net

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          skip_app_build: true
          app_location: dist
          api_location: ''
          output_location: ''
